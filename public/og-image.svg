    <line x1="0" y1="42" x2="400" y2="42" stroke="rgba(255,255,255,0.06)"/>
    <circle cx="20" cy="21" r="4" fill="rgba(255,255,255,0.14)"/>
    <circle cx="34" cy="21" r="4" fill="rgba(255,255,255,0.14)"/>
    <circle cx="48" cy="21" r="4" fill="rgba(255,255,255,0.14)"/>
    <text x="200" y="26" text-anchor="middle"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="11" fill="#8F8676" letter-spacing="2">engineer.js</text>

    <!-- Code lines: gutter number + naturally-flowing tspans -->
    
    <text x="24" y="76" text-anchor="end"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13" fill="#6b6375">1</text>
    <text y="76"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13"><tspan x="40" fill="#8FB0F0" xml:space="preserve">const</tspan><tspan fill="#B7AE9C" xml:space="preserve"> engineer </tspan><tspan fill="#8FB0F0" xml:space="preserve">= </tspan><tspan fill="#B7AE9C" xml:space="preserve">{</tspan></text>
    
    <text x="24" y="104" text-anchor="end"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13" fill="#6b6375">2</text>
    <text y="104"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13"><tspan x="40" fill="#EDE8DD" xml:space="preserve">  name</tspan><tspan fill="#B7AE9C" xml:space="preserve">: </tspan><tspan fill="#7BE3B3" xml:space="preserve">&quot;Tom Rhys Jones&quot;</tspan><tspan fill="#B7AE9C" xml:space="preserve">,</tspan></text>
    
    <text x="24" y="132" text-anchor="end"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13" fill="#6b6375">3</text>
    <text y="132"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13"><tspan x="40" fill="#EDE8DD" xml:space="preserve">  role</tspan><tspan fill="#B7AE9C" xml:space="preserve">: </tspan><tspan fill="#7BE3B3" xml:space="preserve">&quot;Full-Stack Engineer&quot;</tspan><tspan fill="#B7AE9C" xml:space="preserve">,</tspan></text>
    
    <text x="24" y="160" text-anchor="end"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13" fill="#6b6375">4</text>
    <text y="160"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13"><tspan x="40" fill="#EDE8DD" xml:space="preserve">  stack</tspan><tspan fill="#B7AE9C" xml:space="preserve">: </tspan><tspan fill="#B7AE9C" xml:space="preserve">[</tspan></text>
    
    <text x="24" y="188" text-anchor="end"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13" fill="#6b6375">5</text>
    <text y="188"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13"><tspan x="40" fill="#7BE3B3" xml:space="preserve">    &quot;React&quot;</tspan><tspan fill="#B7AE9C" xml:space="preserve">, </tspan><tspan fill="#7BE3B3" xml:space="preserve">&quot;Node&quot;</tspan><tspan fill="#B7AE9C" xml:space="preserve">, </tspan><tspan fill="#7BE3B3" xml:space="preserve">&quot;Django&quot;</tspan><tspan fill="#B7AE9C" xml:space="preserve">,</tspan></text>
    
    <text x="24" y="216" text-anchor="end"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13" fill="#6b6375">6</text>
    <text y="216"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13"><tspan x="40" fill="#7BE3B3" xml:space="preserve">    &quot;Mongo&quot;</tspan><tspan fill="#B7AE9C" xml:space="preserve">, </tspan><tspan fill="#7BE3B3" xml:space="preserve">&quot;Postgres&quot;</tspan></text>
    
    <text x="24" y="244" text-anchor="end"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13" fill="#6b6375">7</text>
    <text y="244"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13"><tspan x="40" fill="#B7AE9C" xml:space="preserve">  ],</tspan></text>
    
    <text x="24" y="272" text-anchor="end"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13" fill="#6b6375">8</text>
    <text y="272"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13"><tspan x="40" fill="#EDE8DD" xml:space="preserve">  builds</tspan><tspan fill="#B7AE9C" xml:space="preserve">: </tspan><tspan fill="#8FB0F0" xml:space="preserve">() =&gt; </tspan><tspan fill="#7BE3B3" xml:space="preserve">&quot;useful apps&quot;</tspan><tspan fill="#B7AE9C" xml:space="preserve">,</tspan></text>
    
    <text x="24" y="300" text-anchor="end"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13" fill="#6b6375">9</text>
    <text y="300"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="13"><tspan x="40" fill="#B7AE9C" xml:space="preserve">};</tspan></text>

    <!-- Footer -->
    <line x1="0" y1="328" x2="400" y2="328" stroke="rgba(255,255,255,0.06)"/>
    <circle cx="20" cy="349" r="3" fill="#34D399"/>
    <text x="32" y="354"
          font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
          font-size="12" fill="#8F8676">Ready to ship</text>
    <text x="380" y="354" text-anchor="end"
          font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
          font-size="11" fill="#8F8676">UTF-8 · LF</text>
  </g>

  <!-- URL / footer -->
  <text x="80" y="600"
        font-family="'JetBrains Mono', 'Menlo', ui-monospace, monospace"
        font-size="13" fill="#8F8676" letter-spacing="1">
    portfolio-olive-mu-34.vercel.app
  </text>
  <text x="1120" y="600" text-anchor="end"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#8F8676">
    London · United Kingdom
  </text>
</svg>